<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #374151;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #3B82F6;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .ac-dial {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #1e40af 0deg, #3b82f6 120deg, #60a5fa 240deg, #93c5fd 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ac-dial-inner {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .ac-needle {
            position: absolute;
            width: 2px;
            height: 50px;
            background: #60a5fa;
            transform-origin: bottom center;
            transform: rotate(45deg);
            bottom: 50%;
            left: 50%;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ToggleSwitch = ({ isOn, handleToggle }) => {
            return (
                <label className="toggle-switch">
                    <input type="checkbox" checked={isOn} onChange={handleToggle} />
                    <span className="slider"></span>
                </label>
            );
        };

        const CameraFeed = ({ title, isLive, resolution }) => {
            return (
                <div className="bg-gray-800 rounded-lg overflow-hidden">
                    <div className="p-3 flex justify-between items-center">
                        <span className="text-sm text-gray-300">{title}</span>
                        <ToggleSwitch isOn={isLive} handleToggle={() => {}} />
                    </div>
                    <div className="relative">
                        <img
                            src="https://placehold.co/400x250/4a4a4a/ffffff?text=Bedroom"
                            alt={`${title} camera feed showing a bedroom with bed and furniture`}
                            className="w-full h-40 object-cover"
                        />
                        <div className="absolute top-2 right-2 bg-black bg-opacity-50 px-2 py-1 rounded text-xs">
                            {resolution}
                        </div>
                        <div className="absolute top-2 left-2 bg-red-600 px-2 py-1 rounded text-xs flex items-center">
                            <span className="w-2 h-2 bg-red-400 rounded-full mr-1"></span>
                            Live
                        </div>
                    </div>
                </div>
            );
        };

        const WeatherWidget = () => {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex items-center mb-3">
                        <i className="fas fa-map-marker-alt text-gray-400 mr-2"></i>
                        <span className="text-sm text-gray-300">Yogyakarta</span>
                    </div>
                    <div className="flex items-center justify-between">
                        <div>
                            <div className="text-4xl font-light">28°</div>
                            <div className="text-sm text-gray-400">Outdoor Temperature</div>
                        </div>
                        <div className="text-5xl">
                            <i className="fas fa-sun text-yellow-400"></i>
                        </div>
                    </div>
                    <div className="mt-4 grid grid-cols-3 gap-2">
                        <div className="text-center">
                            <div className="text-xs text-gray-400">Nest Wifi</div>
                            <div className="flex items-center justify-center mt-1">
                                <ToggleSwitch isOn={true} handleToggle={() => {}} />
                            </div>
                        </div>
                        <div className="text-center">
                            <div className="text-xs text-gray-400">Bang Tv</div>
                            <div className="flex items-center justify-center mt-1">
                                <ToggleSwitch isOn={false} handleToggle={() => {}} />
                            </div>
                        </div>
                        <div className="text-center">
                            <div className="text-xs text-gray-400">Thermostat</div>
                            <div className="flex items-center justify-center mt-1">
                                <ToggleSwitch isOn={true} handleToggle={() => {}} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AirConditioner = () => {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <div className="text-lg font-medium">Air Conditioner</div>
                            <div className="text-sm text-gray-400">Living Room</div>
                        </div>
                        <ToggleSwitch isOn={true} handleToggle={() => {}} />
                    </div>
                    <div className="flex justify-center mb-4">
                        <div className="ac-dial">
                            <div className="ac-needle"></div>
                            <div className="ac-dial-inner">
                                <div className="text-2xl font-light">21.5°</div>
                                <div className="text-xs text-gray-400">UNDER 7 MIN</div>
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center mb-4">
                        <span className="text-sm">16°</span>
                        <div className="flex space-x-2">
                            <button className="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                                <i className="fas fa-minus text-xs"></i>
                            </button>
                            <button className="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                                <i className="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                        <span className="text-sm">32°</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                        <button className="bg-gray-700 rounded-lg py-2 text-sm flex items-center justify-center">
                            <i className="fas fa-fan mr-2"></i>
                            Fan Speed
                        </button>
                        <button className="bg-gray-700 rounded-lg py-2 text-sm flex items-center justify-center">
                            <i className="fas fa-clock mr-2"></i>
                            Timer
                        </button>
                        <button className="bg-blue-600 rounded-lg py-2 text-sm flex items-center justify-center">
                            <i className="fas fa-snowflake mr-2"></i>
                            Auto Mode
                        </button>
                    </div>
                    <div className="mt-3 text-xs text-gray-400">
                        <div>2 Level - Off</div>
                        <div>5 Hours - Off</div>
                        <div>Power On</div>
                    </div>
                </div>
            );
        };

        const DeviceControl = ({ icon, title, subtitle, isOn }) => {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex items-center justify-between mb-2">
                        <div className="text-center">
                            <div className="text-3xl mb-1">{icon}</div>
                            <div className="text-sm font-medium">{title}</div>
                            <div className="text-xs text-gray-400">{subtitle}</div>
                        </div>
                        <ToggleSwitch isOn={isOn} handleToggle={() => {}} />
                    </div>
                </div>
            );
        };

        const EnergyChart = () => {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex justify-between items-center mb-4">
                        <div className="text-lg font-medium">Energy Used</div>
                        <select className="bg-gray-700 text-sm rounded px-2 py-1">
                            <option>Weekly</option>
                        </select>
                    </div>
                    <div className="relative h-32">
                        <svg className="w-full h-full" viewBox="0 0 300 120">
                            <polyline
                                fill="none"
                                stroke="#3b82f6"
                                strokeWidth="2"
                                points="0,80 50,60 100,90 150,40 200,70 250,30 300,50"
                            />
                            <circle cx="50" cy="60" r="3" fill="#3b82f6" />
                            <circle cx="100" cy="90" r="3" fill="#3b82f6" />
                            <circle cx="150" cy="40" r="3" fill="#3b82f6" />
                            <circle cx="200" cy="70" r="3" fill="#3b82f6" />
                            <circle cx="250" cy="30" r="3" fill="#3b82f6" />
                            <circle cx="300" cy="50" r="3" fill="#3b82f6" />
                        </svg>
                        <div className="absolute top-2 right-2 bg-gray-700 px-2 py-1 rounded text-xs">
                            102 kWh
                        </div>
                    </div>
                    <div className="flex justify-between text-xs text-gray-400 mt-2">
                        <span>Mon</span>
                        <span>Tue</span>
                        <span>Wed</span>
                        <span>Thu</span>
                        <span>Fri</span>
                        <span>Sat</span>
                        <span>Sun</span>
                    </div>
                </div>
            );
        };

        const MusicPlayer = () => {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex items-center">
                        <img
                            src="https://placehold.co/60x60/4a4a4a/ffffff?text=Album"
                            alt="Album cover for Bring Me To Life by Evanescence"
                            className="w-12 h-12 rounded mr-3"
                        />
                        <div className="flex-1">
                            <div className="font-medium">Bring Me To Life</div>
                            <div className="text-sm text-gray-400">Evanescence</div>
                        </div>
                        <div className="flex items-center space-x-3">
                            <button className="text-gray-400">
                                <i className="fas fa-step-backward"></i>
                            </button>
                            <button className="bg-blue-600 w-8 h-8 rounded-full flex items-center justify-center">
                                <i className="fas fa-play text-xs"></i>
                            </button>
                            <button className="text-gray-400">
                                <i className="fas fa-step-forward"></i>
                            </button>
                        </div>
                    </div>
                    <div className="mt-3">
                        <div className="flex justify-between text-xs text-gray-400 mb-1">
                            <span>1:36</span>
                            <span>-3:24</span>
                        </div>
                        <div className="bg-gray-700 h-1 rounded-full">
                            <div className="bg-blue-500 h-1 rounded-full" style={{width: '40%'}}></div>
                        </div>
                    </div>
                </div>
            );
        };

        const Sidebar = () => {
            const menuItems = [
                { icon: 'fas fa-bolt', active: true },
                { icon: 'fas fa-th-large' },
                { icon: 'fas fa-tv' },
                { icon: 'fas fa-envelope' },
                { icon: 'fas fa-calendar' },
                { icon: 'fas fa-file-alt' },
                { icon: 'fas fa-cog' },
                { icon: 'fas fa-credit-card' }
            ];

            return (
                <div className="bg-gray-900 w-16 flex flex-col items-center py-4 space-y-6">
                    {menuItems.map((item, index) => (
                        <button
                            key={index}
                            className={`w-8 h-8 rounded flex items-center justify-center ${item.active ? 'bg-blue-600' : 'text-gray-400 hover:text-white'}`}
                        >
                            <i className={item.icon}></i>
                        </button>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('LivingRoom');

            const rooms = ['LivingRoom', 'Dining Room', 'Bed Room', 'Bath Room', 'Backyard', 'Garage'];

            return (
                <div className="flex h-screen bg-gray-900">
                    <Sidebar />

                    <div className="flex-1 flex flex-col">
                        {/* Header */}
                        <header className="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-medium">Good Morning, Lemonaru</h1>
                            <div className="flex items-center space-x-4">
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Search"
                                        className="bg-gray-800 text-white px-4 py-2 rounded-lg pl-10 w-64"
                                    />
                                    <i className="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                                </div>
                                <button className="bg-gray-800 p-2 rounded-lg">
                                    <i className="fas fa-bell text-gray-400"></i>
                                </button>
                                <div className="flex items-center space-x-2">
                                    <img
                                        src="https://placehold.co/32x32/4a4a4a/ffffff?text=U"
                                        alt="User avatar"
                                        className="w-8 h-8 rounded-full"
                                    />
                                    <span className="text-sm">Lemonaru</span>
                                    <i className="fas fa-chevron-down text-gray-400 text-xs"></i>
                                </div>
                            </div>
                        </header>

                        {/* Main Content */}
                        <main className="flex-1 p-6 overflow-auto">
                            <div className="grid grid-cols-12 gap-6">
                                {/* Left Column - Camera Feeds */}
                                <div className="col-span-5 space-y-6">
                                    <CameraFeed title="Bed Room" isLive={true} resolution="4K Resolution" />
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <h2 className="text-lg font-medium">My Rooms</h2>
                                            <button className="bg-blue-600 text-xs px-3 py-1 rounded flex items-center">
                                                <i className="fas fa-plus mr-1"></i>
                                                Add Device +
                                            </button>
                                        </div>
                                        <div className="flex space-x-2 mb-3">
                                            {rooms.map(room => (
                                                <button
                                                    key={room}
                                                    onClick={() => setActiveTab(room)}
                                                    className={`px-3 py-1 rounded text-sm ${activeTab === room ? 'bg-blue-600' : 'bg-gray-800'}`}
                                                >
                                                    {room}
                                                </button>
                                            ))}
                                        </div>
                                        <CameraFeed title="Living Room" isLive={true} resolution="4K Resolution" />
                                    </div>
                                </div>

                                {/* Right Column - Controls */}
                                <div className="col-span-7 space-y-6">
                                    <div className="grid grid-cols-2 gap-6">
                                        <WeatherWidget />
                                        <AirConditioner />
                                    </div>

                                    <div className="grid grid-cols-4 gap-4">
                                        <DeviceControl icon="🌡️" title="Humidifier" subtitle="Xiaomi Mi - X300" isOn={true} />
                                        <DeviceControl icon="🔊" title="Speaker" subtitle="Google Speaker - A21" isOn={true} />
                                        <DeviceControl icon="📹" title="Camera CCTV" subtitle="Google Camera - X2" isOn={true} />
                                        <DeviceControl icon="🌡️" title="Thermostat" subtitle="Google Thermostat" isOn={true} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-6">
                                        <MusicPlayer />
                                        <EnergyChart />
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
